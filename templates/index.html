<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Peramalan Energi - Inces Aya</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: none; border-radius: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .stat-card { padding: 25px; text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: 800; }
        .text-actual { color: #94a3b8; } /* Abu-abu untuk Aktual */
        .text-pred { color: #f43f5e; }    /* Merah untuk Prediksi */
        .chart-container { position: relative; height: 500px; width: 100%; }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container-fluid px-5 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold m-0">Energy Forecasting</h1>
            <p class="text-secondary">Simulasi Direct Forecasting - Dataset 2019</p>
        </div>
        <div id="connection-status" class="status-badge bg-success">SISTEM AKTIF</div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card stat-card">
                <small class="text-secondary d-block mb-2">WAKTU SISTEM</small>
                <div id="time-val" class="fs-3 fw-bold text-info">--:--</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <small class="text-secondary d-block mb-2">BEBAN AKTUAL (MW)</small>
                <div id="actual-val" class="stat-value text-actual">--</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <small class="text-secondary d-block mb-2">PREDIKSI +6 JAM (MW)</small>
                <div id="pred-val" class="stat-value text-pred">--</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <small class="text-secondary d-block mb-2">KONDISI CUACA</small>
                <div id="weather-val" class="fs-4 fw-bold text-warning">--</div>
                <small id="temp-val" class="text-muted">--</small>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="chart-container">
            <canvas id="energyChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('energyChart').getContext('2d');
    
    const energyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // Ini akan berisi jam-jam masa depan (T+6)
            datasets: [
                {
                    label: 'Beban Aktual (Saat Ini)',
                    data: [],
                    borderColor: '#94a3b8',
                    borderWidth: 2,
                    borderDash: [5, 5], 
                    fill: false,
                    tension: 0.3
                },
                {
                    label: 'Prediksi (Masa Depan +6 Jam)',
                    data: [],
                    borderColor: '#f43f5e',
                    backgroundColor: 'rgba(244, 63, 94, 0.1)',
                    borderWidth: 4,
                    fill: true,
                    tension: 0.4
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { ticks: { color: '#94a3b8' } },
                x: { ticks: { color: '#94a3b8' } }
            }
        }
    });

    function updateDashboard() {
        fetch('/get_prediction')
            .then(response => response.json())
            .then(data => {
                // 1. Ambil waktu dari server (Misal: 00:00)
                const inputTime = new Date(data.time);
                const jamSekarang = String(inputTime.getHours()).padStart(2, '0') + ":" + String(inputTime.getMinutes()).padStart(2, '0');
                
                // 2. Hitung waktu masa depan (Tambah 6 Jam -> Jadi 06:00)
                const targetTime = new Date(inputTime.getTime() + (6 * 60 * 60 * 1000));
                const jamMasaDepan = String(targetTime.getHours()).padStart(2, '0') + ":" + String(targetTime.getMinutes()).padStart(2, '0');

                // 3. Tampilkan Jam Sekarang di CARD (Sesuai maumu)
                document.getElementById('time-val').innerText = jamSekarang;
                document.getElementById('actual-val').innerText = Math.round(data.actual).toLocaleString();
                document.getElementById('pred-val').innerText = Math.round(data.prediction).toLocaleString();
                document.getElementById('weather-val').innerText = data.weather.toUpperCase();
                document.getElementById('temp-val').innerText = data.temp.toFixed(1) + " °K";

                // 4. Update Grafik agar labelnya pakai Jam Masa Depan
                if (energyChart.data.labels.length > 30) {
                    energyChart.data.labels.shift();
                    energyChart.data.datasets[0].data.shift();
                    energyChart.data.datasets[1].data.shift();
                }

                // Label sumbu X pake jam masa depan (Jam 06:00)
                energyChart.data.labels.push(jamMasaDepan);
                
                // Masukkan data
                energyChart.data.datasets[0].data.push(data.actual);     
                energyChart.data.datasets[1].data.push(data.prediction); 
                
                energyChart.update('none'); 
            });
    }

    // Update setiap 2 detik biar cepet kelihatan perubahannya
    updateDashboard();
    setInterval(updateDashboard, 2000);
</script>

</body>
</html>
