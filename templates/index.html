<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Inces Aya Energy Forecasting</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: none; border-radius: 20px; }
        .stat-card { padding: 20px; text-align: center; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: #38bdf8; }
        .warmup-overlay { color: #fbbf24; font-weight: bold; }
        .chart-container { height: 450px; width: 100%; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold">👸 Energy Load Control Center</h2>
        <div id="status-msg" class="badge bg-warning text-dark p-2">Sistem Memulai...</div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-md-4">
            <div class="card stat-card">
                <small class="text-secondary">WAKTU INPUT</small>
                <div id="time-display" class="fs-4">--:--</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <small class="text-secondary">BEBAN AKTUAL (MW)</small>
                <div id="actual-display" class="stat-value text-white">--</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <small class="text-secondary">PREDIKSI +6 JAM (MW)</small>
                <div id="pred-display" class="stat-value" style="color: #f43f5e;">--</div>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    const mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Beban Aktual', data: [], borderColor: '#94a3b8', borderWidth: 2, fill: false },
                { label: 'Prediksi (+6 Jam)', data: [], borderColor: '#f43f5e', borderWidth: 3, tension: 0.4, fill: false }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });

    function update() {
        fetch('/get_prediction')
            .then(r => r.json())
            .then(data => {
                const statusBox = document.getElementById('status-msg');
                const timeStr = data.time.split(' ')[1].substring(0, 5);
                
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('actual-display').innerText = data.actual.toFixed(0);

                if (data.status === 'warmup') {
                    statusBox.innerText = `PEMANASAN: Mengumpulkan data riil (${data.current_step}/${data.limit} Jam)`;
                    statusBox.className = "badge bg-warning text-dark p-2";
                } else {
                    statusBox.innerText = "SISTEM AKTIF: Melakukan Peramalan";
                    statusBox.className = "badge bg-success p-2";
                    document.getElementById('pred-display').innerText = data.prediction.toFixed(0);
                }

                // Update Grafik
                if (mainChart.data.labels.length > 20) {
                    mainChart.data.labels.shift();
                    mainChart.data.datasets[0].data.shift();
                    mainChart.data.datasets[1].data.shift();
                }

                mainChart.data.labels.push(timeStr);
                mainChart.data.datasets[0].data.push(data.actual);
                mainChart.data.datasets[1].data.push(data.status === 'ready' ? data.prediction : null);
                mainChart.update();
            });
    }

    // Jalankan tiap 20 detik
    update();
    setInterval(update, 20000);
</script>
</body>
</html>
