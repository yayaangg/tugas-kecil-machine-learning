<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Energy Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background: #16213e; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #e94560; }
        /* Perbaikan ukuran grafik agar lebih lebar dan panjang */
        .chart-container { position: relative; height: 500px; width: 100%; }
    </style>
</head>
<body>

<div class="container-fluid px-5 py-4">
    <div class="text-center mb-4">
        <h1 class="fw-bold">Energy Forecasting</h1>
        <p class="text-info">Sistem Peramalan Beban Listrik</p>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <span class="text-muted">ESTIMASI BEBAN TARGET</span>
                <div id="pred-val" class="stat-value">--</div>
                <span id="target-time-label" class="badge bg-danger">Waktu Target: --</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <span class="text-muted">KONDISI CUACA INPUT</span>
                <div id="temp-val" class="stat-value text-warning" style="font-size: 2rem;">--</div>
                <span id="weather-val" class="badge bg-primary">Condition</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <span class="text-muted">WAKTU INPUT DATA</span>
                <div id="time-val" class="stat-value text-success" style="font-size: 2rem;">--</div>
                <span class="badge bg-secondary">Data Real-time</span>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="chart-container">
            <canvas id="energyChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('energyChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Prediksi Beban Listrik (MW) untuk 6 Jam ke Depan',
                data: [],
                borderColor: '#e94560',
                backgroundColor: 'rgba(233, 69, 96, 0.2)',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, // Penting agar tinggi grafik mengikuti CSS
            plugins: { 
                legend: { labels: { color: 'white', font: { size: 14 } } } 
            },
            scales: {
                y: { 
                    beginAtZero: false,
                    ticks: { color: 'white' }, 
                    grid: { color: '#0f3460' },
                    title: { display: true, text: 'Megawatt (MW)', color: 'white' }
                },
                x: { 
                    ticks: { color: 'white', maxRotation: 45, minRotation: 45 }, 
                    grid: { color: '#0f3460' },
                    title: { display: true, text: 'Waktu Target Kejadian (Input + 6 Jam)', color: 'white' }
                }
            }
        }
    });

    function fetchData() {
        fetch('/get_prediction')
            .then(res => res.json())
            .then(data => {
                // Logika Waktu: Tambahkan 6 jam untuk label target
                let inputTime = new Date(data.time);
                let targetTime = new Date(inputTime.getTime() + (6 * 60 * 60 * 1000));
                
                let timeStr = inputTime.getHours() + ":" + String(inputTime.getMinutes()).padStart(2, '0');
                let targetStr = targetTime.getHours() + ":" + String(targetTime.getMinutes()).padStart(2, '0');

                // Update UI Text
                document.getElementById('pred-val').innerText = data.prediction.toFixed(2);
                document.getElementById('temp-val').innerText = data.temp.toFixed(1) + "°K";
                document.getElementById('weather-val').innerText = data.weather.toUpperCase();
                document.getElementById('time-val').innerText = timeStr;
                document.getElementById('target-time-label').innerText = "Target Jam: " + targetStr;

                // Update Chart (Sumbu X menggunakan Waktu Target)
                if(chart.data.labels.length > 20) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                }
                
                chart.data.labels.push(targetStr);
                chart.data.datasets[0].data.push(data.prediction);
                chart.update();
            });
    }

    fetchData(); 
    setInterval(fetchData, 20000); 
</script>
</body>
</html>
